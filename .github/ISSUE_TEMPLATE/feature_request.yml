name: Feature Request
description: Suggest a new feature or integration
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What feature would you like?
      placeholder: Describe the feature clearly
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Use Case
      description: Why do you need this feature? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Are there any workarounds or alternative approaches?

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New Korean service integration
        - New global service integration
        - SDK improvement
        - MCP server
        - Security
        - Documentation
        - Other
    validations:
      required: true
